# ═══════════════════════════════════════════════════════════
#  DevPilot — Nginx Configuration (HTTPS :8888)
#
#  路由:
#    /              → 前端静态文件
#    /auth/*        → Auth Service (用户登录/注册)
#    /chat/*        → Auth Service (JWT验证 → 代理到ClawAPI, 注入API Key)
#    /health        → Auth Service 健康检查
#
#  架构:
#    用户 → Nginx → Auth Service → ClawAPI
#                    (JWT验证)      (API Key)
#    API Key 只在服务器端传递，前端无法获取
# ═══════════════════════════════════════════════════════════

server {
    listen 8888 ssl;
    server_name oc.xbot.cool;

    # --- SSL (Let's Encrypt) ---
    ssl_certificate     /etc/letsencrypt/live/oc.xbot.cool/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oc.xbot.cool/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # --- Frontend (static files) ---
    location / {
        root /opt/devpilot/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # --- Auth Service (登录/注册/JWT) ---
    location /auth/ {
        proxy_pass http://127.0.0.1:16001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Chat API (Auth验证JWT → 代理到ClawAPI) ---
    location /chat/ {
        proxy_pass http://127.0.0.1:16001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;

        # SSE headers
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }

    # --- Health check ---
    location = /health {
        proxy_pass http://127.0.0.1:16001;
        proxy_set_header Host $host;
    }

    # --- Admin API (大模型配置等管理接口) ---
    location /admin/ {
        proxy_pass http://127.0.0.1:16001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Projects API ---
    location /projects {
        proxy_pass http://127.0.0.1:16001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- AI API (route/context/chat) ---
    location /ai/ {
        proxy_pass http://127.0.0.1:16001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
