# ═══════════════════════════════════════════════════════════
#  DevPilot — p.xbot.cool Nginx Configuration
#
#  服务架构:
#    p.xbot.cool  — 前端 + Auth Service + 管理API
#    oc.xbot.cool — ClawAPI 大模型服务 (AI Gateway)
#
#  路由:
#    /              → 前端静态文件
#    /auth/*        → Auth Service (登录/注册/JWT)
#    /admin/*       → Auth Service (管理员配置接口)
#    /chat/*        → Auth Service (JWT验证 → 代理到ClawAPI)
#    /projects/*    → Auth Service (项目管理)
#    /ai/*          → Auth Service (AI路由/上下文/对话)
#    /health        → Auth Service 健康检查
# ═══════════════════════════════════════════════════════════

server {
    listen 8888 ssl;
    server_name p.xbot.cool;

    # --- SSL ---
    ssl_certificate     /etc/letsencrypt/live/p.xbot.cool/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/p.xbot.cool/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # --- Frontend (static files) ---
    location / {
        root /opt/devpilot/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # --- Auth Service (登录/注册/JWT) ---
    location /auth/ {
        proxy_pass http://127.0.0.1:16001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Admin API (大模型配置等管理接口) ---
    location /admin/ {
        proxy_pass http://127.0.0.1:16001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Chat API (Auth验证JWT → 代理到ClawAPI) ---
    location /chat/ {
        proxy_pass http://127.0.0.1:16001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }

    # --- Projects API ---
    location /projects {
        proxy_pass http://127.0.0.1:16001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- AI API (route/context/chat) ---
    location /ai/ {
        proxy_pass http://127.0.0.1:16001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Health check ---
    location = /health {
        proxy_pass http://127.0.0.1:16001;
        proxy_set_header Host $host;
    }
}
